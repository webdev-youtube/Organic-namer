kind = "web"
previewPath = "/"
title = "ChemName — IUPAC Nomenclature Generator"
version = "1.0.0"
id = "artifacts/chemname"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22428

[services.development]
run = "pnpm --filter @workspace/chemname run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chemname", "run", "build" ]
publicDir = "artifacts/chemname/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22428"
BASE_PATH = "/"
